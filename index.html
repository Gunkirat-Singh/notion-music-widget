<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <style>
        body {
            margin: 0;
            padding: 15px;
            background-color: #000000;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            overflow: hidden;
        }

        .player-container {
            width: 100%;
            max-width: 400px; /* Adjusts width for your sidebar */
        }

        /* Standard 16:9 Aspect Ratio */
        .video-frame {
            width: 100%;
            aspect-ratio: 16 / 9;
            border-radius: 12px;
            overflow: hidden;
            background: #111;
            border: 1px solid rgba(255,255,255,0.1);
            margin-bottom: 15px;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        .info-section {
            text-align: left;
            padding-left: 5px;
        }

        .track-name {
            color: #FFFFFF;
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 3px;
        }

        .status-badge {
            display: inline-block;
            color: #00FF95; /* Aesthetic neon green for "Live" look */
            font-size: 10px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            border: 1px solid #00FF95;
            padding: 2px 6px;
            border-radius: 4px;
        }
    </style>
</head>
<body>

<div class="player-container">
    <div class="video-frame">
        <iframe 
            src="https://www.youtube.com/embed/videoseries?list=PLuXBepVDtfVDfj6bYU3jb5f0bdqE-ljVU&modestbranding=1&rel=0&color=white" 
            allow="autoplay; encrypted-media">
        </iframe>
    </div>
    
    <div class="info-section">
        <div class="track-name">Focus Playlist</div>
        <div class="status-badge">System Audio Active</div>
    </div>
</div>

</body>
</html>
